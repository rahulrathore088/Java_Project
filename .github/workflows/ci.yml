name: Trigger AWS CodeBuild

on:
  push:
    branches: [ "**" ]

permissions:
  id-token: write    # required for OIDC
  contents: read

jobs:
  trigger-codebuild:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::568925321819:role/github-actions-oidc-role
          aws-region: us-east-2

      - name: Trigger CodeBuild
        id: build
        run: |
          BUILD_ID=$(aws codebuild start-build \
            --project-name calculator-job \
            --query 'build.id' \
            --output text)
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT

      - name: Wait for result
        run: |
          BUILD_ID="${{ steps.build.outputs.build_id }}"
          while true; do
            STATUS=$(aws codebuild batch-get-builds \
              --ids $BUILD_ID \
              --query 'builds[0].buildStatus' \
              --output text)
            echo "Status: $STATUS"
            if [ "$STATUS" = "SUCCEEDED" ]; then exit 0; fi
            if [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "STOPPED" ]; then exit 1; fi
            sleep 15
          done
